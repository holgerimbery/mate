name: Build & Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: ${{ matrix.image }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.value }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mate-webui
            dockerfile: infra/local/Dockerfile.webui
          - image: mate-worker
            dockerfile: infra/local/Dockerfile.worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::VERSION file ($VERSION) does not match git tag ($TAG)"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            # Tag with full semver on version tags (e.g. v1.2.3 → 1.2.3)
            type=semver,pattern={{version}}
            # Tag with major.minor (e.g. 1.2)
            type=semver,pattern={{major}}.{{minor}}
            # Only tag `latest` for stable releases (no pre-release suffix like -rc.1)
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            # Always tag with short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          # Extract the section between ## [$VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > release-notes.md

      - name: Generate quickstart package
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          DIR="mate-quickstart-${VERSION}"
          mkdir -p "$DIR"

          # Pin the image tags in docker-compose.yml to the exact release version
          sed "s|mate-webui:latest|mate-webui:${VERSION}|g; s|mate-worker:latest|mate-worker:${VERSION}|g" \
            quickstart/docker-compose.yml > "$DIR/docker-compose.yml"

          cp quickstart/.env.template "$DIR/.env.template"
          cp quickstart/README.txt "$DIR/README.txt"

          zip -r "mate-quickstart-${VERSION}.zip" "$DIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.value }}"
          body_path: release-notes.md
          files: mate-quickstart-${{ steps.version.outputs.value }}.zip
          fail_on_unmatched_files: true
