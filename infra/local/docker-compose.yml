# mate — local development stack
# Usage: docker compose up -d
# The WebUI will be available at http://localhost:5000
#
# Infrastructure__Provider controls the blob storage target:
#   Container — PostgreSQL + Azurite (default, Docker Desktop / CI)
#   Azure     — Azure Database for PostgreSQL + Azure Blob Storage (production)
#
# PostgreSQL and Azurite always start; no profile flag required.

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: mate-postgres
    environment:
      POSTGRES_DB: mate
      POSTGRES_USER: mate
      POSTGRES_PASSWORD: mate_local_pw
    ports:
      - "5432:5432"
    volumes:
      - mate-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Azurite — Azure Blob Storage emulator ──────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: mate-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000"   # Blob
      - "10001:10001"   # Queue
      - "10002:10002"   # Table
    volumes:
      - mate-azurite:/data
    restart: unless-stopped

  # ── WebUI ──────────────────────────────────────────────────────────────────
  webui:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.webui
    container_name: mate-webui
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ASPNETCORE_URLS=http://+:8080
      - TZ=${MATE_TIMEZONE:-Europe/Berlin}
      - Authentication__Scheme=${Authentication__Scheme:-Generic}
      - AzureAd__Instance=${AzureAd__Instance:-https://login.microsoftonline.com/}
      - AzureAd__TenantId=${AzureAd__TenantId:-}
      - AzureAd__ClientId=${AzureAd__ClientId:-}
      - AzureAd__ClientSecret=${AzureAd__ClientSecret:-}
      - AzureAd__CallbackPath=${AzureAd__CallbackPath:-/signin-oidc}
      - AzureAd__SignedOutCallbackPath=${AzureAd__SignedOutCallbackPath:-/signout-callback-oidc}
      - AzureAd__ResponseType=code
      - AzureAd__RedirectUri=${AzureAd__RedirectUri:-}
      - ReverseProxy__TrustedProxyAddress=${ReverseProxy__TrustedProxyAddress:-}
      - Monitoring__Provider=Generic
      - Branding__BrandName=${Branding__BrandName:-mate}
      - Branding__BrandTagline=${Branding__BrandTagline:-Multi-Agent Testing Environment - AI agent quality testing platform}
      - Branding__BrandCliDescription=${Branding__BrandCliDescription:-quality testing tool for conversational AI agents}
      - Branding__LogoUrl=${Branding__LogoUrl:-/mate-logo.png}
      - Branding__LogoWideUrl=${Branding__LogoWideUrl:-/mate-logo-wide.png}
      - Branding__ApiKeyPrefix=${Branding__ApiKeyPrefix:-mate_}
      # ── Storage tier ──────────────────────────────────────────────────────
      # "Container" = PostgreSQL + Azurite  (default)
      # "Azure"     = Azure Database for PostgreSQL + Azure Blob Storage
      - Infrastructure__Provider=${Infrastructure__Provider:-Container}
      - RedmondMode=false
      - AzureInfrastructure__UseKeyVaultForSecrets=${AzureInfrastructure__UseKeyVaultForSecrets:-false}
      - AzureInfrastructure__KeyVaultUri=${AzureInfrastructure__KeyVaultUri:-}
      # Azure credentials — required when UseKeyVaultForSecrets=true (single-vault mode)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - ConnectionStrings__Default=Host=postgres;Database=mate;Username=mate;Password=mate_local_pw
      - AzureInfrastructure__BlobConnectionString=UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite
      - AzureInfrastructure__BlobContainerName=mate-blobs
    volumes:
      - mate-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.worker
    container_name: mate-worker
    environment:
      - DOTNET_ENVIRONMENT=Development
      - TZ=${MATE_TIMEZONE:-Europe/Berlin}
      - Infrastructure__Provider=${Infrastructure__Provider:-Container}
      - RedmondMode=false
      - AzureInfrastructure__UseKeyVaultForSecrets=${AzureInfrastructure__UseKeyVaultForSecrets:-false}
      - AzureInfrastructure__KeyVaultUri=${AzureInfrastructure__KeyVaultUri:-}
      # Azure credentials — required when UseKeyVaultForSecrets=true (single-vault mode)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - ConnectionStrings__Default=Host=postgres;Database=mate;Username=mate;Password=mate_local_pw
      - AzureInfrastructure__BlobConnectionString=UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite
      - AzureInfrastructure__BlobContainerName=mate-blobs
    volumes:
      - mate-logs:/app/logs
    depends_on:
      webui:
        condition: service_healthy
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    restart: unless-stopped

volumes:
  mate-logs:
    name: mate-logs
  mate-pgdata:
    name: mate-pgdata
  mate-azurite:
    name: mate-azurite
