version: "3.9"

# mate — local development stack
# Usage: docker compose up -d
# The WebUI will be available at http://localhost:5000
# Worker and CLI are optional — omit them if running directly via `dotnet run`

services:
  # ── WebUI ──────────────────────────────────────────────────────────────────
  webui:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.webui
    container_name: mate-webui
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Trust X-Forwarded-Proto / X-Forwarded-For from the upstream proxy (matches MaaJforMCS)
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ASPNETCORE_URLS=http://+:8080
      - Authentication__Scheme=${Authentication__Scheme:-Generic}
      - AzureAd__Instance=${AzureAd__Instance:-https://login.microsoftonline.com/}
      - AzureAd__TenantId=${AzureAd__TenantId:-}
      - AzureAd__ClientId=${AzureAd__ClientId:-}
      - AzureAd__ClientSecret=${AzureAd__ClientSecret:-}
      - AzureAd__CallbackPath=${AzureAd__CallbackPath:-/signin-oidc}
      - AzureAd__SignedOutCallbackPath=${AzureAd__SignedOutCallbackPath:-/signout-callback-oidc}
      - AzureAd__ResponseType=code
      # Public URL that nginx exposes – used by OIDC to build the correct redirect_uri.
      # Example: https://mate.example.com
      - AzureAd__RedirectUri=${AzureAd__RedirectUri:-}
      # IP address of the nginx proxy (or leave empty to trust the Docker bridge 172.16/12)
      - ReverseProxy__TrustedProxyAddress=${ReverseProxy__TrustedProxyAddress:-}
      - Monitoring__Provider=Generic
      - ConnectionStrings__Default=Data Source=/app/data/mate-local.db
      - LocalInfrastructure__BlobStoragePath=/app/data/blobs
      - LocalInfrastructure__SqliteDatabasePath=/app/data/mate-local.db
      - LocalInfrastructure__BackupPath=/app/data/backups
    volumes:
      - mate-data:/app/data
      - mate-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.worker
    container_name: mate-worker
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__Default=Data Source=/app/data/mate-local.db
      - LocalInfrastructure__BlobStoragePath=/app/data/blobs
      - LocalInfrastructure__SqliteDatabasePath=/app/data/mate-local.db
      - LocalInfrastructure__BackupPath=/app/data/backups
    volumes:
      - mate-data:/app/data
      - mate-logs:/app/logs
    depends_on:
      webui:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mate-data:
    name: mate-data
  mate-logs:
    name: mate-logs
